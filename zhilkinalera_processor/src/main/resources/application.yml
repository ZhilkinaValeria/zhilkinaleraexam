spring:
  application:
    name: zhilkinalera_processor

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  datasource:
    jdbc-url: jdbc:postgresql://localhost:5432/passport_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

clickhouse:
  url: jdbc:clickhouse://localhost:8123/default
  username: default
  password: ""

server:
  port: 8081

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html